# MedSest Visita — configuração Nginx (produção)
# Copiar para /etc/nginx/sites-available/medsest e criar symlink em sites-enabled.

server {
    listen 80;
    server_name app.medsest.com.br;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    server_name app.medsest.com.br;

    ssl_certificate /etc/letsencrypt/live/app.medsest.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.medsest.com.br/privkey.pem;

    client_max_body_size 50M;

    # Frontend (build estático)
    location / {
        root /var/www/medsest/frontend;
        try_files $uri $uri/ /index.html;
        expires 1h;
    }

    # Service worker e manifest — nunca cachear
    location ~* (service-worker\.js|manifest\.webmanifest)$ {
        root /var/www/medsest/frontend;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }

    # Proxy reverso para a API FastAPI
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Fotos enviadas
    location /uploads/ {
        alias /var/www/medsest/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
