<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 76 78" role="img" aria-label="Símbolo MedSest">
  <title>MedSest</title>
  <!--
    Reprodução vetorial do símbolo do logo MedSest, a partir do PNG de 300x78
    (única arte disponível). Geometria e gradientes medidos pixel a pixel do
    original. O vetor existe porque o PNG não tem resolução para favicon,
    ícones do PWA (192/512) e cabeçalho impresso.

    Coordenadas do original (área colorida, sem contorno):
      barra verde vertical .... x 30-47, y  8-71
      barra azul horizontal ... x  7-71, y 30-48
      meia-lua azul (atrás) ... x 48-52 visível, y 8-27
      lasca verde (atrás) ..... x  8-28 visível, y 48-51

    O contorno branco do original existe SÓ no contorno externo: dentro da
    figura as barras se encostam sem separador. Por isso ele é desenhado como
    uma camada branca dilatada por baixo, e não como stroke de cada barra.
  -->
  <defs>
    <linearGradient id="ms-verde" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#009848"/>
      <stop offset="1" stop-color="#004225"/>
    </linearGradient>
    <linearGradient id="ms-azul" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2E3287"/>
      <stop offset="1" stop-color="#164A9B"/>
    </linearGradient>
    <linearGradient id="ms-azul-claro" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#37509E"/>
      <stop offset="1" stop-color="#2664AF"/>
    </linearGradient>
    <linearGradient id="ms-verde-claro" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#007038"/>
      <stop offset="1" stop-color="#00833B"/>
    </linearGradient>
    <filter id="ms-sombra" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="1.5" dy="2" stdDeviation="1.2" flood-opacity="0.3"/>
    </filter>

    <!-- As 4 barras. A ordem cria a trama: as de trás só assomam nas bordas
         que as da frente não cobrem. -->
    <g id="ms-barras">
      <rect id="ms-b1" x="35" y="8" width="17" height="40" rx="2.5"/>
      <rect id="ms-b2" x="7"  y="33" width="21" height="18" rx="2.5"/>
      <rect id="ms-b3" x="7"  y="30" width="64" height="18" rx="2.5"/>
      <rect id="ms-b4" x="30" y="8"  width="17" height="63" rx="2.5"/>
    </g>
  </defs>

  <g filter="url(#ms-sombra)">
    <!-- Contorno: silhueta dilatada em branco, por baixo de tudo -->
    <use href="#ms-barras" fill="#FFFFFF" stroke="#FFFFFF" stroke-width="4"
         stroke-linejoin="round"/>

    <!-- Barras coloridas, sem stroke -->
    <use href="#ms-b1" fill="url(#ms-azul-claro)"/>
    <use href="#ms-b2" fill="url(#ms-verde-claro)"/>
    <use href="#ms-b3" fill="url(#ms-azul)"/>
    <use href="#ms-b4" fill="url(#ms-verde)"/>
  </g>
</svg>
